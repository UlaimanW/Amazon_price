name: Amazon Wishlist Price Tracker

on:
  workflow_dispatch:

  schedule:
    # 09:00 UTC = 12:00 PM Saudi time
    # 21:00 UTC = 12:00 AM Saudi time
    - cron: "0 9,21 * * *"

permissions:
  contents: write

concurrency:
  group: amazon-wishlist-price-tracker
  cancel-in-progress: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Amazon Price Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WISHLIST_URL: ${{ secrets.WISHLIST_URL }}
        run: python app.py run

      - name: Commit updated products.json
        run: |
          if git diff --quiet -- products.json; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add products.json
          git commit -m "Update tracked product prices"
          git push